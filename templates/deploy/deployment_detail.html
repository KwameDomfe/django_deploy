{% extends "base.html" %}
{% load static %}

{% block title %}
  {{ deployment.name }}
{% endblock %}

{% block content %}
  <header>
    <h1>{{ deployment.name }}</h1>
  </header>
  
  <main>
    <hr>
    <p>{{ deployment.description }}</p>
    <small>Created at: {{ deployment.created_at }}</small>
    <hr> 
  </main>

  <footer>
    <p>{{ deployment.name }} Page Footer</p>  
  </footer>

{% endblock %}
