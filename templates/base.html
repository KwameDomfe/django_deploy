{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>
      My Django App || {% block title %}
     
      {% endblock %}
    </title>
    <link rel="stylesheet" href="{% static 'css/gdb_normalize.css' %}">
    <link rel="stylesheet" href="{% static 'css/utilities.css' %}">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
  </head>
  <body class="container container80">
    <header>
      {% include 'mainHeader.html' %}
    </header>
    <main>
      {% block content %}
      {% endblock %}
    </main>
    <footer>
      {% include 'mainFooter.html' %}
    </footer>
  </body>
</html>
